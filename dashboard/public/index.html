<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>오프라인 마케팅 아이디어 대시보드</title>
    <link rel="icon" type="image/svg+xml" href="financier.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark"><img src="financier.svg" alt=""></span>
          <div>
            <h1>기획안 관리</h1>
            <p>카테고리 · 프로젝트 · 매장</p>
          </div>
        </div>
        <section class="scope-panel" aria-label="카테고리 관리">
          <button type="button" id="allScopeButton" class="scope-root active">
            <span>전체 업무</span>
            <strong id="allScopeCount">0</strong>
          </button>
          <form id="categoryForm" class="category-form" autocomplete="off">
            <label>
              <span>대카테고리</span>
              <input name="major" type="text" placeholder="마케팅">
            </label>
            <label>
              <span>소카테고리</span>
              <input name="subcategory" type="text" placeholder="오프라인 캠페인">
            </label>
            <button type="submit">카테고리 추가</button>
          </form>
          <div id="categoryTree" class="category-tree" aria-label="카테고리 트리"></div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="board-title">
            <h2>기획안 보드</h2>
            <p class="active-scope-title" id="activeScopePath">전체 업무</p>
          </div>
          <div class="status-strip" aria-live="polite">
            <span id="storageMode">확인 중</span>
            <span id="saveStatus" class="status-pill idle">대기</span>
          </div>
        </header>

        <section id="overview" class="metric-grid" aria-label="아이디어 요약">
          <article class="metric">
            <span>아이디어</span>
            <strong id="metricIdea">0</strong>
          </article>
          <article class="metric">
            <span>논의</span>
            <strong id="metricDiscussion">0</strong>
          </article>
          <article class="metric">
            <span>상세기획</span>
            <strong id="metricPlanning">0</strong>
          </article>
          <article class="metric">
            <span>진행</span>
            <strong id="metricProgress">0</strong>
          </article>
          <article class="metric">
            <span>완료</span>
            <strong id="metricDone">0</strong>
          </article>
        </section>

        <section class="stage-tabs" id="stageTabs" aria-label="단계 필터">
          <button type="button" data-stage="all" class="active">
            <span>전체</span>
            <strong>0</strong>
          </button>
          <button type="button" data-stage="idea">
            <span>아이디어</span>
            <strong>0</strong>
          </button>
          <button type="button" data-stage="discussion">
            <span>논의</span>
            <strong>0</strong>
          </button>
          <button type="button" data-stage="planning">
            <span>상세기획</span>
            <strong>0</strong>
          </button>
          <button type="button" data-stage="progress">
            <span>진행</span>
            <strong>0</strong>
          </button>
          <button type="button" data-stage="done">
            <span>완료</span>
            <strong>0</strong>
          </button>
        </section>

        <section class="quick-filters" id="quickFilters" aria-label="빠른 보기">
          <div class="quick-filter-header">
            <div>
              <p class="section-mode">읽기</p>
              <h3>빠른 보기</h3>
            </div>
            <button type="button" id="clearFiltersButton">초기화</button>
          </div>
          <label class="quick-search">
            <span>프로젝트 검색</span>
            <input id="projectSearch" type="search" placeholder="프로젝트명, 제목, 내용">
          </label>
          <div class="filter-lanes">
            <div class="filter-lane">
              <span>대카테고리</span>
              <div class="filter-pills" data-scope-options="major"></div>
            </div>
            <div class="filter-lane">
              <span>소카테고리</span>
              <div class="filter-pills" data-scope-options="subcategory"></div>
            </div>
            <div class="filter-lane" data-filter-key="owner">
              <span>팀원</span>
              <div class="filter-pills" data-filter-options="owner"></div>
            </div>
            <div class="filter-lane" data-filter-key="store">
              <span>매장</span>
              <div class="filter-pills" data-filter-options="store"></div>
            </div>
            <div class="filter-lane" data-filter-key="workType">
              <span>구분</span>
              <div class="filter-pills" data-filter-options="workType"></div>
            </div>
          </div>
        </section>

        <section id="records" class="records-section">
          <div class="section-heading">
            <h3>기획안 목록</h3>
            <span id="recordCount">0개</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>제목</th>
                  <th>카테고리</th>
                  <th>매장</th>
                  <th>담당자</th>
                  <th>상태</th>
                  <th>우선순위</th>
                  <th>유형</th>
                  <th>첨부</th>
                  <th>수정일</th>
                </tr>
              </thead>
              <tbody id="ideasBody"></tbody>
            </table>
          </div>
        </section>

        <section id="input" class="input-layout">
          <form id="ideaForm" class="entry-form" autocomplete="off">
            <div class="form-header">
              <div>
                <p class="section-mode">쓰기</p>
                <h3>기획안 작성</h3>
                <p id="formScopeNote" class="form-scope-note">전체 업무</p>
              </div>
              <button type="button" id="newIdeaButton">새 기획안</button>
            </div>

            <div class="form-grid">
              <label class="wide">
                <span>기획/아이디어 제목</span>
                <input name="title" type="text" placeholder="예: 머문래 점심시간 샘플링 이벤트">
              </label>
              <label>
                <span>작업 구분</span>
                <select name="work_type">
                  <option value="아이디어">아이디어</option>
                  <option value="기획안">기획안</option>
                  <option value="프로젝트">프로젝트</option>
                  <option value="업무">업무</option>
                </select>
              </label>
              <label>
                <span>프로젝트명</span>
                <input name="project_name" type="text" placeholder="예: 7월 매장 유입 캠페인">
              </label>
              <label data-scope-field="category_major">
                <span>대카테고리</span>
                <select id="categoryMajorSelect" name="category_major">
                  <option value="">선택</option>
                </select>
              </label>
              <label data-scope-field="category_sub">
                <span>소카테고리</span>
                <select id="categorySubSelect" name="category_sub">
                  <option value="">선택</option>
                </select>
              </label>
              <label data-scope-field="store">
                <span>매장</span>
                <select name="store">
                  <option value="">선택</option>
                  <option value="머문래">머문래</option>
                  <option value="갤러리문래">갤러리문래</option>
                </select>
              </label>
              <label>
                <span>담당자</span>
                <select name="owner">
                  <option value="">선택</option>
                  <option value="준호">준호</option>
                  <option value="동원">동원</option>
                  <option value="보미">보미</option>
                  <option value="상준">상준</option>
                  <option value="유민">유민</option>
                </select>
              </label>
              <label>
                <span>상태</span>
                <select name="status">
                  <option value="idea">아이디어</option>
                  <option value="discussion">논의</option>
                  <option value="planning">상세기획</option>
                  <option value="progress">진행</option>
                  <option value="done">완료</option>
                </select>
              </label>
              <label>
                <span>우선순위</span>
                <select name="priority">
                  <option value="medium">보통</option>
                  <option value="high">높음</option>
                  <option value="urgent">긴급</option>
                  <option value="low">낮음</option>
                </select>
              </label>
              <label>
                <span>유형</span>
                <select name="idea_type">
                  <option value="">선택</option>
                  <option value="프로모션">프로모션</option>
                  <option value="이벤트">이벤트</option>
                  <option value="제휴">제휴</option>
                  <option value="콘텐츠">콘텐츠</option>
                  <option value="매장운영">매장운영</option>
                  <option value="고객경험">고객경험</option>
                </select>
              </label>
              <label class="wide">
                <span>아이디어 내용</span>
                <textarea name="description" rows="6" placeholder="아이디어의 배경, 장면, 고객 반응 가설"></textarea>
              </label>
              <label class="wide">
                <span>기대 효과</span>
                <textarea name="expected_impact" rows="3" placeholder="유입, 구매, 재방문, 리뷰 등 기대하는 효과"></textarea>
              </label>
              <label class="wide">
                <span>다음 액션</span>
                <textarea name="next_action" rows="3" placeholder="누가 무엇을 언제까지 할지"></textarea>
              </label>
              <fieldset class="attachment-field wide">
                <legend>첨부</legend>
                <div class="attachment-grid">
                  <label>
                    <span>첨부 링크</span>
                    <textarea name="links" rows="3" placeholder="https://example.com 또는 제목 | https://example.com"></textarea>
                  </label>
                  <label class="photo-picker">
                    <span>사진</span>
                    <input id="photoInput" name="photos" type="file" accept="image/*" multiple>
                    <strong>사진 선택</strong>
                  </label>
                </div>
                <div id="photoPreview" class="photo-preview" aria-live="polite"></div>
                <p id="mediaStatus" class="media-status" aria-live="polite"></p>
              </fieldset>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script src="app.js" type="module"></script>
  </body>
</html>
